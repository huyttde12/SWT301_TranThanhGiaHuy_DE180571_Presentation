<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Đăng Ký - Presentation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; color: #555; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .error { color: #dc3545; font-size: 13px; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đăng Ký Tài Khoản</h2>
        <div class="form-group">
            <label>Email liên hệ:</label>
            <input type="text" id="email" placeholder="Nhập email...">
            <span id="email_error" class="error"></span>
        </div>
        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
            <span id="password_error" class="error"></span>
        </div>
        <div class="form-group">
            <label>Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" placeholder="Nhập lại mật khẩu...">
            <span id="confirm_password_error" class="error"></span>
        </div>
        <button id="submit_btn">Đăng Ký Ngay</button>
        <span id="general_error" class="error" style="text-align: center; margin-top: 10px;"></span>
    </div>

    <script>
        document.getElementById('submit_btn').onclick = function() {
            // Xóa lỗi cũ
            document.getElementById('email_error').innerText = "";
            document.getElementById('password_error').innerText = "";
            document.getElementById('confirm_password_error').innerText = "";
            document.getElementById('general_error').innerText = "";
            
            let email = document.getElementById('email').value.trim();
            let pass = document.getElementById('password').value;
            let conf = document.getElementById('confirm_password').value;

            // Business Rules Mới (Hỗ trợ 12 Test Cases)
            if (email === "") {
                document.getElementById('email_error').innerText = "Vui lòng nhập email";
            } else if (!email.includes("@") || !email.includes(".")) {
                document.getElementById('email_error').innerText = "Email không hợp lệ (thiếu @ hoặc dấu chấm)";
            } else if (email === "existing@example.com") {
                document.getElementById('general_error').innerText = "Email này đã được sử dụng";
            } else if (pass === "") {
                document.getElementById('password_error').innerText = "Vui lòng nhập mật khẩu";
            } else if (pass.length < 8) {
                document.getElementById('password_error').innerText = "Mật khẩu phải có ít nhất 8 ký tự";
            } else if (conf === "") {
                document.getElementById('confirm_password_error').innerText = "Vui lòng xác nhận mật khẩu";
            } else if (pass !== conf) {
                document.getElementById('confirm_password_error').innerText = "Mật khẩu xác nhận không khớp";
            } else {
                alert("Đăng ký thành công!");
            }
        };
    </script>
</body>
</html>
